name: 'JAVA Case study end to end flow'

on: [push]

jobs:
  lint-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Lint Code Base
        uses: github/super-linter/slim@v4
        env:
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: master
          DISABLE_ERRORS: true
          VALIDATE_JAVA: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-code:
    runs-on: ubuntu-latest
    needs: lint-code
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven and SonarCloud
        run: |
          mvn verify sonar:sonar \
          -Dsonar.projectKey=JaneDoe383_java-reachability-playground \
          -Dsonar.organization=sonaranalysis-codered \
          -Dsonar.host.url=https://sonarcloud.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  snyk-security-scan:
    runs-on: ubuntu-latest
    needs: build-code
    steps:
      - uses: actions/checkout@v3

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk.sarif

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: snyk.sarif

  dast-zap-scan:
    runs-on: ubuntu-latest
    needs: snyk-security-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          target: 'http://testasp.vulnweb.com'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
